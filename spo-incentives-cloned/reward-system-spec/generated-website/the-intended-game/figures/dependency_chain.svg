<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800">
  <title>The Dependency Chain — three player classes locked into a chain of mutual rationality</title>
  <desc>Figure 2.4 from The Intended Game.</desc>
  <defs>
    <style>
      text { dominant-baseline: alphabetic; }
      .display { font-family: 'Chivo', 'Inter', sans-serif; font-weight: 600; }
      .display-small { font-family: 'Chivo', 'Inter', sans-serif; font-weight: 600; }
      .body { font-family: 'Inter', sans-serif; font-weight: 400; }
      .body-bold { font-family: 'Inter', sans-serif; font-weight: 600; }
      .body-light { font-family: 'Inter', sans-serif; font-weight: 300; }
      .eyebrow { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.16em; }
      .chip { font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.06em; }
      .caption { font-family: 'Inter', sans-serif; font-weight: 300; font-style: italic; }
    </style>
    <marker id="arr-dawn" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 Z" fill="#EC641D"/></marker>
    <marker id="arr-ink" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 Z" fill="#1a1a1a"/></marker>
  </defs>
  <rect width="1600" height="800" fill="#ffffff"/>

  <text x="60" y="58" class="eyebrow" font-size="13" fill="#E52321">FIG. 2.4 · §2.4 THE DEPENDENCY CHAIN</text>
  <text x="60" y="100" class="display" font-size="34" fill="#1a1a1a">Three player classes locked into a chain of mutual rationality</text>
  <text x="60" y="134" class="body" font-size="17" fill="#6b6b6b">Each link is individually rational and incentive-compatible — the chain holds without trust between participants.</text>
  <line x1="60" y1="160" x2="1540" y2="160" stroke="#e2e0dc" stroke-width="1"/>

  <!-- Card 1 — Transaction submitters -->
  <g transform="translate(60,200)">
    <rect width="430" height="380" rx="10" fill="#faf9f7" stroke="#e2e0dc" stroke-width="1.5"/>
    <rect width="430" height="6" fill="#E52321"/>
    <text x="32" y="58" class="eyebrow" font-size="11" fill="#E52321">01 · SOURCE OF DEMAND</text>
    <text x="32" y="100" class="display" font-size="26" fill="#1a1a1a">Transaction submitters</text>
    <g transform="translate(32,118)"><rect width="160" height="30" rx="4" fill="#1a1a1a"/><text x="80" y="20" class="chip" font-size="11" fill="#ffffff" text-anchor="middle">FEE PAYMENTS</text></g>
    <!-- Headline: punchy 2-clause action -->
    <text x="32" y="208" class="display-small" font-size="22" fill="#1a1a1a">Pay fees. Fund the game.</text>
    <!-- Why it matters: one tight sentence -->
    <text x="32" y="252" class="body" font-size="15" fill="#6b6b6b">Their willingness to pay reveals</text>
    <text x="32" y="272" class="body" font-size="15" fill="#6b6b6b">what the network is actually worth.</text>
    <!-- Trajectory pill -->
    <g transform="translate(32,330)">
      <text x="0" y="0" class="eyebrow" font-size="10" fill="#999">TRAJECTORY</text>
      <text x="0" y="22" class="body-bold" font-size="13" fill="#1a1a1a">Marginal today → existential tomorrow</text>
    </g>
  </g>

  <text x="540" y="370" class="caption" font-size="13" fill="#6b6b6b" text-anchor="middle">funds the game</text>
  <line x1="495" y1="390" x2="585" y2="390" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-ink)"/>

  <!-- Card 2 — Operators -->
  <g transform="translate(595,200)">
    <rect width="430" height="380" rx="10" fill="#faf9f7" stroke="#e2e0dc" stroke-width="1.5"/>
    <rect width="430" height="6" fill="#EC641D"/>
    <text x="32" y="58" class="eyebrow" font-size="11" fill="#EC641D">02 · CAPITAL AT RISK</text>
    <text x="32" y="100" class="display" font-size="26" fill="#1a1a1a">Operators</text>
    <g transform="translate(32,118)"><rect width="100" height="30" rx="4" fill="#1a1a1a"/><text x="50" y="20" class="chip" font-size="11" fill="#ffffff" text-anchor="middle">PLEDGE</text></g>
    <text x="32" y="208" class="display-small" font-size="22" fill="#1a1a1a">Lock capital. Produce blocks.</text>
    <text x="32" y="252" class="body" font-size="15" fill="#6b6b6b">Pledge is the visible bond — skin</text>
    <text x="32" y="272" class="body" font-size="15" fill="#6b6b6b">in the game that costs to abandon.</text>
    <g transform="translate(32,330)">
      <text x="0" y="0" class="eyebrow" font-size="10" fill="#999">TRAJECTORY</text>
      <text x="0" y="22" class="body-bold" font-size="13" fill="#1a1a1a">First pledge → committed pillar</text>
    </g>
  </g>

  <text x="1075" y="370" class="caption" font-size="13" fill="#6b6b6b" text-anchor="middle">submit themselves to</text>
  <line x1="1030" y1="390" x2="1120" y2="390" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arr-ink)"/>

  <!-- Card 3 — Delegators -->
  <g transform="translate(1130,200)">
    <rect width="410" height="380" rx="10" fill="#faf9f7" stroke="#e2e0dc" stroke-width="1.5"/>
    <rect width="410" height="6" fill="#3b7982"/>
    <text x="32" y="58" class="eyebrow" font-size="11" fill="#3b7982">03 · OVERSIGHT LAYER</text>
    <text x="32" y="100" class="display" font-size="26" fill="#1a1a1a">Delegators</text>
    <g transform="translate(32,118)"><rect width="180" height="30" rx="4" fill="#1a1a1a"/><text x="90" y="20" class="chip" font-size="11" fill="#ffffff" text-anchor="middle">LIQUID DELEGATION</text></g>
    <text x="32" y="208" class="display-small" font-size="22" fill="#1a1a1a">Allocate stake. Police operators.</text>
    <text x="32" y="252" class="body" font-size="15" fill="#6b6b6b">Stake is revocable at every epoch —</text>
    <text x="32" y="272" class="body" font-size="15" fill="#6b6b6b">the protocol's substitute for governance.</text>
    <g transform="translate(32,330)">
      <text x="0" y="0" class="eyebrow" font-size="10" fill="#999">TRAJECTORY</text>
      <text x="0" y="22" class="body-bold" font-size="13" fill="#1a1a1a">Passive yield → active oversight</text>
    </g>
  </g>

  <!-- Loop-closing arc -->
  <path d="M 1335 590 C 1335 700, 800 720, 275 720 C 100 720, 90 690, 90 600" fill="none" stroke="#E52321" stroke-width="1.5" stroke-dasharray="6 6" marker-end="url(#arr-dawn)"/>
  <text x="800" y="752" class="body-bold" font-size="13" fill="#E52321" text-anchor="middle">↻  A more secure network attracts more demand — Fig. 4 closes the loop.</text>
</svg>
